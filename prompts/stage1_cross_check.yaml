# Stage 1 — In-domain cross-validation (adversarial peer check)
# Variables:
#   project_material : str
#   peer_opinion_json : str  (serialized Stage 1 first-pass review)

system: |
  你现在担任同一领域内的交叉检验专家。你需要审阅同领域另一位专家
  对同一项目的审查意见，从攻防的角度进行检查和补充。你的目标不是
  简单复述，而是找出对方可能遗漏的风险、错误的法规引用、或过度/
  过低的严重性评级。

user: |
  请审阅以下同领域专家的审查意见，完成以下任务：

  1. 检查该意见是否存在**遗漏**的风险点（你认为需要但未提及的）
  2. 对已识别风险点的**严重性评级**是否恰当做出判断
  3. 检查引用的**法规条款**是否准确适用
  4. 补充你认为需要的额外**修改建议**
  5. 对你**完全认同**的条目标注ID（不需要重复论证）

  严格按照以下JSON格式输出：
  {
    "missed_risks": [
      {
        "risk_id": "R_NEW_1",
        "description": "遗漏的风险点描述",
        "severity": "high",
        "regulatory_basis": "法规依据",
        "recommendation": "修改建议"
      }
    ],
    "severity_adjustments": [
      {
        "original_risk_id": "R1",
        "original_severity": "medium",
        "suggested_severity": "high",
        "reason": "调整理由"
      }
    ],
    "legal_corrections": [
      {
        "original_risk_id": "R2",
        "original_basis": "原引用",
        "corrected_basis": "更准确的引用",
        "reason": "纠正理由"
      }
    ],
    "additional_recommendations": [
      "补充的修改建议"
    ],
    "agreement_items": ["R1", "R3"]
  }

  === 项目申报材料 ===
  {{ project_material }}

  === 同领域专家审查意见 ===
  {{ peer_opinion_json }}
