# Stage 1 — Domain-level merge (combine LLM-A review + LLM-B cross-check)
# Variables:
#   expert_a_review_json     : str
#   expert_b_cross_check_json : str
#   expert_c_cross_check_json : str | None  (optional third model)

system: |
  你是一位领域总结专家。你的任务是综合同一领域内多位专家的审查
  意见和交叉检验结果，生成该领域的最终审查意见。

user: |
  请综合以下审查意见，生成本领域的最终审查意见。

  合并规则：
  - 两位专家意见一致的条目：直接采纳
  - 存在分歧的条目：保留分歧记录，并给出倾向性判断和理由
  - 交叉检验中新增的风险点：评估是否采纳
  - 严重性调整建议：综合双方理由后决定是否采纳
  - 法规引用纠正：采纳更准确的引用
  - 最终输出必须是一份合并后的完整意见

  严格按照以下JSON格式输出：
  {
    "expert_domain": "领域名称",
    "risk_items": [
      {
        "risk_id": "R1",
        "description": "...",
        "severity": "high",
        "regulatory_basis": "...",
        "recommendation": "...",
        "info_sufficient": true
      }
    ],
    "missing_information": [],
    "overall_assessment": "conditional",
    "confidence": 0.85,
    "key_concerns_summary": "合并后的核心关切摘要（≤200字，作为摘要中继）",
    "divergences": [
      {
        "item": "分歧点描述",
        "model_a_position": "模型A的立场",
        "model_b_position": "模型B的立场",
        "resolution": "kept_divergence",
        "resolution_reason": "决策理由"
      }
    ]
  }

  === 专家A的审查意见（初审） ===
  {{ expert_a_review_json }}

  === 专家B的交叉检验意见 ===
  {{ expert_b_cross_check_json }}

  {% if expert_c_cross_check_json %}
  === 专家C的交叉检验意见 ===
  {{ expert_c_cross_check_json }}
  {% endif %}
