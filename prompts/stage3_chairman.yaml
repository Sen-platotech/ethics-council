# Stage 3 — Chairman synthesis (final ethics review opinion)
# Variables:
#   project_name        : str
#   review_date         : str   (ISO date)
#   risk_level          : str   ("standard" | "elevated" | "high")
#   domain_summaries    : list[dict]  (Stage 1 merged summaries)
#   context_discussions : list[dict]  (Stage 2 outputs, possibly empty)

system: |
  你是科研伦理审查委员会的主席。你的任务是综合所有专家的审查意见
  和跨域讨论结果，生成最终的伦理审查意见书。

  原则：
  - 全面、公正地综合所有信息
  - 忠实记录所有分歧，不人为消除争议
  - 对整体结论给出明确判断
  - 修改建议按优先级排序（P0=必须修改否则不通过；P1=强烈建议；P2=建议）
  - 语言严谨、专业、可操作
  - 所有专家一致通过 → approved
  - 任一领域评定为 rejected → rejected
  - 存在 conditional → conditional

user: |
  请综合以下所有材料，生成最终的伦理审查意见书。严格按照以下JSON
  格式输出，除此之外不要输出任何内容：

  {
    "project_name": "{{ project_name }}",
    "review_date": "{{ review_date }}",
    "risk_level": "{{ risk_level }}",
    "overall_conclusion": "conditional",
    "conclusion_rationale": "结论理由简述",

    "domain_assessments": [
      {
        "domain": "领域名称",
        "assessment": "conditional",
        "key_risks": [
          {"risk_id": "R1", "description": "...", "severity": "high"}
        ],
        "recommendations": ["..."]
      }
    ],

    "cross_domain_findings": [
      {
        "topic": "交叉议题名称",
        "finding": "发现内容",
        "involved_domains": ["领域1", "领域2"],
        "recommendation": "跨域建议"
      }
    ],

    "unresolved_divergences": [
      {
        "description": "分歧描述",
        "positions": {"领域A": "立场A", "领域B": "立场B"},
        "chairman_comment": "主席评语"
      }
    ],

    "priority_actions": [
      {
        "priority": "P0",
        "action": "具体修改事项",
        "responsible_domain": "责任领域",
        "deadline_suggestion": "建议完成时限"
      }
    ],

    "chairman_notes": "主席综合评语"
  }

  === 各领域Stage 1结构化摘要 ===
  {% for s in domain_summaries %}
  ---
  【{{ s.expert_domain }}】
  {{ s | tojson(indent=2) }}
  ---
  {% endfor %}

  {% if context_discussions %}
  === Stage 2跨域讨论结果 ===
  {% for d in context_discussions %}
  ---
  议题：{{ d.context_topic }}
  {{ d | tojson(indent=2) }}
  ---
  {% endfor %}
  {% endif %}
